<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Informe Policial</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* Estilos base (móvil primero) */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0.5rem;
        }
        .container {
            max-width: 1000px;
            margin: 10px auto;
            padding: 1rem;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        /* Títulos de sección y subsección */
        .section-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 1rem;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .cai-section-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #374151;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding-bottom: 0.25rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .subsection-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #374151;
            margin-top: 1rem;
            margin-bottom: 0.75rem;
        }
        /* Campos de entrada y áreas de texto */
        .input-field {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
        /* Estilos para botones */
        .btn {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-width: 38px;
            min-height: 38px;
        }
        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            gap: 0.3rem;
            min-width: 32px;
            min-height: 32px;
        }
        .btn-float {
            border-radius: 9999px;
            width: 56px;
            height: 56px;
            padding: 0;
            font-size: 1.25rem;
        }
        .btn-primary { background-color: #2563eb; color: #ffffff; }
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        .btn-secondary { background-color: #6b7280; color: #ffffff; }
        .btn-secondary:hover { background-color: #4b5563; transform: translateY(-1px); }
        .btn-danger { background-color: #ef4444; color: #ffffff; }
        .btn-danger:hover { background-color: #dc2626; transform: translateY(-1px); }
        .btn-success { background-color: #22c55e; color: #ffffff; }
        .btn-success:hover { background-color: #16a34a; }
        
        .btn-dark-blue { background-color: #1e40af; color: #ffffff; }
        .btn-dark-blue:hover { background-color: #1e3a8a; }

        /* Estilos para tarjetas de contenido */
        .card {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        /* Estilos para la salida del informe */
        .report-output {
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            min-height: 150px;
            font-family: monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            color: #374151;
        }
        
        /* Búsqueda de Personal */
        .search-result-item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            background-color: #fff;
        }
        .search-result-item .info {
            font-size: 0.9rem;
            flex-grow: 1;
        }
        .search-result-item .status {
             font-size: 0.8rem;
             width: 100%;
             margin-top: 0.25rem;
        }
        .search-result-item .status-assigned { color: #ef4444; font-weight: 600; }
        .search-result-item .status-free { color: #22c55e; font-weight: 600; }

        /* Estilos para el Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background-color: #ffffff;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 500px;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 1rem;
        }
        .modal-message {
            font-size: 0.9rem;
            color: #4b5563;
            margin-bottom: 1rem;
            text-align: center;
        }
        .modal-input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        
        .copy-feedback {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 1001;
        }
        .copy-feedback.show { opacity: 1; visibility: visible; }

        /* SELECTOR CON BÚSQUEDA */
        .search-select-container {
            position: relative;
            width: 100%;
        }
        .search-select-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: white;
            border: 1px solid #d1d5db;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1010;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .search-select-option {
            padding: 0.6rem 0.8rem;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .search-select-option:hover {
            background-color: #f0f2f5;
        }
        .search-select-clear-btn {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 0.25rem;
        }
        .search-select-clear-btn:hover {
            color: #374151;
        }

        /* Botones de Filtro en Búsqueda */
        .filter-pill {
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e5e7eb;
            background: white;
            color: #6b7280;
        }
        .filter-pill.active {
            background: #1e40af;
            color: white;
            border-color: #1e40af;
        }

        @media (min-width: 640px) {
            body { padding: 2rem; }
            .container { margin: 20px auto; padding: 20px; }
            .section-title { font-size: 1.5rem; }
            .cai-section-title { font-size: 1.25rem; }
            .subsection-title { font-size: 1.25rem; }
            .input-field { padding: 0.75rem 1rem; font-size: 1rem; }
            .btn { padding: 0.75rem 1.25rem; font-size: 1rem; min-width: 44px; min-height: 44px; }
            .btn-sm { padding: 0.5rem 1rem; font-size: 0.9rem; }
            .report-output { padding: 1.5rem; min-height: 200px; font-size: 1rem; }
            .modal-content { padding: 2rem; }
            .modal-title { font-size: 1.75rem; }
            .modal-message { font-size: 1rem; }
            .modal-input { padding: 0.75rem 1rem; font-size: 1rem; }
            .search-result-item .status { width: auto; margin-top: 0; }
        }

        @media (max-width: 639px) {
            .btn-float {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body class="p-4">

    <!-- Botones Flotantes -->
    <div style="position: fixed; top: 50%; left: 20px; transform: translateY(-50%); z-index: 999;" class="flex flex-col gap-3">
        <button onclick="openConfigModal()" class="btn btn-dark-blue btn-float shadow-lg" title="Configuración">
            <i class="fas fa-cog"></i>
        </button>
        <button onclick="downloadData()" class="btn btn-dark-blue btn-float shadow-lg" title="Descargar Datos">
            <i class="fas fa-download"></i>
        </button>
        <label for="uploadFile" class="btn btn-dark-blue btn-float shadow-lg cursor-pointer" title="Cargar Datos">
            <i class="fas fa-upload"></i>
        </label>
        <input type="file" id="uploadFile" class="hidden" accept=".json" onchange="handleFileUpload(event)">
        <button onclick="openSearchModal()" class="btn btn-dark-blue btn-float shadow-lg" title="Buscar Personal">
            <i class="fas fa-search"></i>
        </button>
        <button onclick="openReportModal()" class="btn btn-dark-blue btn-float shadow-lg" title="Generar Informe">
            <i class="fas fa-file-alt"></i>
        </button>
    </div>

    <div class="container">
        <!-- Sección de Equipos y Grupos -->
        <div class="mb-8 p-6 bg-green-50 rounded-lg shadow-inner">
            <h2 class="section-title text-green-800">
                Zonas de Atención
            </h2>
            <div id="assignmentSectionContent">
                <div id="caiSectionsContainer">
                    <!-- Secciones CAI se renderizan aquí -->
                </div>
                <button onclick="addCaiSection()" class="btn btn-primary mt-4"><i class="fas fa-plus"></i></button>

                <div class="mt-8">
                    <h3 class="subsection-title">Otros Grupos</h3>
                    <div id="otherGroupsContainer">
                        <!-- Otros grupos se renderizan aquí -->
                    </div>
                    <div class="flex flex-col sm:flex-row gap-4 mt-4">
                        <input type="text" id="newGroupName" class="input-field flex-grow" placeholder="Nombre del nuevo grupo" aria-label="Nuevo Nombre del Grupo">
                        <button onclick="addOtherGroup()" class="btn btn-primary"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmación/Prompt -->
    <div id="customModalOverlay" class="modal-overlay" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <h3 id="modalTitle" class="modal-title"></h3>
            <p id="modalMessage" class="modal-message"></p>
            <input type="text" id="modalInput" class="modal-input hidden">
            <div class="modal-buttons">
                <button id="modalConfirmBtn" class="btn btn-primary hidden">Aceptar</button>
                <button id="modalCancelBtn" class="btn btn-secondary hidden">Cancelar</button>
            </div>
        </div>
    </div>
    
    <!-- Modal de Búsqueda Mejorado -->
    <div id="searchModalOverlay" class="modal-overlay" onclick="if(event.target === this) closeSearchModal()">
        <div class="modal-content w-full max-w-lg">
             <div class="flex justify-between items-center mb-4">
                <h3 class="modal-title text-left !mb-0">Búsqueda de Personal</h3>
                <button onclick="closeSearchModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            
            <div class="mb-4">
                <input type="text" id="personnelSearch" class="input-field" placeholder="Buscar grado o nombre..." oninput="renderPersonnelSearch()">
            </div>
            
            <div class="flex flex-wrap gap-2 mb-4">
                <button id="filter-all" onclick="setSearchFilter('all')" class="filter-pill active">Todos <span id="count-all">0</span></button>
                <button id="filter-free" onclick="setSearchFilter('free')" class="filter-pill">Disponibles <span id="count-free">0</span></button>
                <button id="filter-assigned" onclick="setSearchFilter('assigned')" class="filter-pill">Asignados <span id="count-assigned">0</span></button>
            </div>

            <div id="personnelSearchResults" class="mt-4 max-h-[50vh] overflow-y-auto pr-1">
                <!-- Los resultados de la búsqueda aparecerán aquí -->
            </div>
        </div>
    </div>

    <!-- Modal de Configuración -->
    <div id="configModalOverlay" class="modal-overlay" onclick="if(event.target === this) closeConfigModal()">
        <div class="modal-content w-full max-w-lg">
            <div class="flex justify-between items-center mb-4">
                <h3 class="modal-title text-left !mb-0">Configuración</h3>
                <button onclick="closeConfigModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div class="max-h-[70vh] overflow-y-auto pr-2">
                <div class="mb-4">
                    <label for="commanderRank" class="block text-gray-700 font-medium mb-2">Grado del Comandante:</label>
                    <input type="text" id="commanderRank" class="input-field" value="" onchange="saveData()">
                </div>
                <div class="mb-4">
                    <label for="commanderName" class="block text-gray-700 font-medium mb-2">Nombre del Comandante:</label>
                    <input type="text" id="commanderName" class="input-field" value="" onchange="saveData()">
                </div>
                <div class="mb-6">
                    <h3 class="subsection-title">Servicios de Importancia <span class="text-sm text-gray-500">(uno por línea)</span></h3>
                    <textarea id="importantServices" class="input-field min-h-[120px]" onchange="saveData()"></textarea>
                </div>
                <div class="mb-6">
                    <h3 class="subsection-title">Gestión de Personal <span class="text-sm text-gray-500">(uno por línea: GRADO NOMBRE)</span></h3>
                    <div class="flex gap-4 mb-4">
                        <label class="inline-flex items-center">
                            <input type="radio" name="personnelListSelector" value="list1" class="form-radio" onchange="switchPersonnelList('list1')">
                            <span class="ml-2 text-gray-700">Lista 1</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" name="personnelListSelector" value="list2" class="form-radio" onchange="switchPersonnelList('list2')">
                            <span class="ml-2 text-gray-700">Lista 2</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" name="personnelListSelector" value="list3" class="form-radio" onchange="switchPersonnelList('list3')">
                            <span class="ml-2 text-gray-700">Lista 3</span>
                        </label>
                    </div>
                    <textarea id="personnelTextarea" class="input-field min-h-[150px]" onchange="saveData()"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Informe Generado -->
    <div id="reportModalOverlay" class="modal-overlay" onclick="if(event.target === this) closeReportModal()">
        <div class="modal-content w-full max-w-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="modal-title text-left !mb-0">Informe Generado</h3>
                <div class="flex gap-2">
                    <button onclick="copyReport()" class="btn btn-secondary btn-sm" title="Copiar informe">
                        <i class="fas fa-copy"></i> Copiar
                    </button>
                    <button onclick="closeReportModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
                </div>
            </div>
            <pre id="reportOutput" class="report-output max-h-[60vh] overflow-y-auto"></pre>
        </div>
    </div>

    <!-- Feedback de copiado -->
    <div id="copyFeedback" class="copy-feedback">¡Copiado!</div>

    <script>
        let scrollPosition = 0;
        let searchFilter = 'all'; // all, free, assigned

        const customModalOverlay = document.getElementById('customModalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalInput = document.getElementById('modalInput');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const searchModalOverlay = document.getElementById('searchModalOverlay');
        const configModalOverlay = document.getElementById('configModalOverlay');
        const reportModalOverlay = document.getElementById('reportModalOverlay');

        function generateUniqueId() {
            return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        function getPersonnelCategory(grade) {
            const oficiales = ["CR", "TC", "MY", "CT", "TE", "ST"];
            const suboficiales = ["CM", "SC", "IJ", "IT", "SI"];
            const patrulleros = ["PT", "PP", "CO", "PC"];
            const g = grade.toUpperCase();
            if (oficiales.includes(g)) return "Oficiales";
            if (suboficiales.includes(g)) return "Suboficiales";
            if (patrulleros.includes(g)) return "Patrulleros";
            return "Desconocido";
        }

        function toTitleCaseSmart(str) {
            if (!str || typeof str !== 'string') return '';
            const minorWords = new Set(['de', 'a', 'en', 'y', 'e', 'o', 'u', 'el', 'la', 'los', 'las', 'un', 'una']);
            const acronyms = new Set(['CAI', 'E-12', 'BU', 'MEBOG']);
            return str.split(' ').map((word, index) => {
                const upperWord = word.toUpperCase();
                if (acronyms.has(upperWord)) return upperWord;
                const lowerWord = word.toLowerCase();
                if (index > 0 && minorWords.has(lowerWord)) return lowerWord;
                return lowerWord.charAt(0).toUpperCase() + lowerWord.slice(1);
            }).join(' ');
        }

        // --- ESTRUCTURA DE DATOS ---
        const defaultConfig = {
            commanderName: "", commanderRank: "", importantServices: [],
            caiSections: [
                { id: generateUniqueId(), name: "CAI - MODELO", teams: [ { id: generateUniqueId(), name: "11-13", members: [] }, { id: generateUniqueId(), name: "12-14", members: [] }, { id: generateUniqueId(), name: "15-16", members: [] } ] },
                { id: generateUniqueId(), name: "CAI - ALCAZARES", teams: [ { id: generateUniqueId(), name: "1", members: [] }, { id: generateUniqueId(), name: "2", members: [] } ] },
                { id: generateUniqueId(), name: "CAI - POLO CLUB", teams: [ { id: generateUniqueId(), name: "6-7", members: [] }, { id: generateUniqueId(), name: "8", members: [] } ] },
                { id: generateUniqueId(), name: "CAI - RIONEGRO", teams: [ { id: generateUniqueId(), name: "9", members: [] }, { id: generateUniqueId(), name: "10", members: [] } ] },
                { id: generateUniqueId(), name: "CAI - 7 DE AGOSTO", teams: [ { id: generateUniqueId(), name: "3", members: [] }, { id: generateUniqueId(), name: "4-5", members: [] } ] }
            ],
            otherGroups: [
                { id: generateUniqueId(), name: "Jefe de Vigilancia", members: [], defaultName: "Jefe de Vigilancia" }, { id: generateUniqueId(), name: "Zona T", members: [], defaultName: "Zona T" }, { id: generateUniqueId(), name: "Jefe de información E-12 y Centinelas", members: [], defaultName: "Jefe de información E-12 y Centinelas" }, { id: generateUniqueId(), name: "Custodios E-12", members: [], defaultName: "Custodios E-12" }, { id: generateUniqueId(), name: "CAI - ALCAZARES (Información)", members: [], defaultName: "CAI - ALCAZARES (Información)" }, { id: generateUniqueId(), name: "CAI - MODELO (Información)", members: [], defaultName: "CAI - MODELO (Información)" }, { id: generateUniqueId(), name: "CAI - POLO CLUB (Información)", members: [], defaultName: "CAI - POLO CLUB (Información)" }, { id: generateUniqueId(), name: "CAI - RIONEGRO (Información)", members: [], defaultName: "CAI - RIONEGRO (Información)" }, { id: generateUniqueId(), name: "CAI - 7 DE AGOSTO (Información)", members: [], defaultName: "CAI - 7 DE AGOSTO (Información)" }, { id: generateUniqueId(), name: "Vacaciones", members: [], defaultName: "Vacaciones" }, { id: generateUniqueId(), name: "Excusado", members: [], defaultName: "Excusado" }, { id: generateUniqueId(), name: "Calamidad", members: [], defaultName: "Calamidad" }
            ],
            uiState: { collapsedCaiSections: {} }
        };

        const initialFullState = {
            allPersonnelLists: { list1: [], list2: [], list3: [] },
            configurations: {
                list1: JSON.parse(JSON.stringify(defaultConfig)),
                list2: JSON.parse(JSON.stringify(defaultConfig)),
                list3: JSON.parse(JSON.stringify(defaultConfig))
            },
            currentListId: 'list1'
        };

        let fullState = {};
        let appData = {};
        let modalCallback = null;

        // --- FUNCIONES MODALES ---
        function showModal(title, message, type, defaultValue = '', callback) {
            scrollPosition = window.scrollY;
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modalCallback = callback;
            modalInput.classList.add('hidden');
            modalConfirmBtn.classList.add('hidden');
            modalCancelBtn.classList.add('hidden');
            if (type === 'prompt') {
                modalInput.value = defaultValue;
                modalInput.classList.remove('hidden');
                modalConfirmBtn.textContent = 'Aceptar';
                modalConfirmBtn.classList.remove('hidden');
            } else if (type === 'confirm') {
                modalConfirmBtn.textContent = 'Sí';
                modalConfirmBtn.classList.remove('hidden');
                modalCancelBtn.textContent = 'No';
                modalCancelBtn.classList.remove('hidden');
            }
            customModalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            if (type === 'prompt') modalInput.focus();
        }

        function closeModal() {
            customModalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            window.scrollTo(0, scrollPosition);
        }

        modalConfirmBtn.onclick = () => {
            closeModal();
            if (modalCallback) modalCallback(!modalInput.classList.contains('hidden') ? modalInput.value : true);
        };
        modalCancelBtn.onclick = () => {
            closeModal();
            if (modalCallback) modalCallback(false);
        };
        
        function openSearchModal() {
            scrollPosition = window.scrollY;
            searchModalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            document.getElementById('personnelSearch').focus();
            renderPersonnelSearch();
        }

        function closeSearchModal() {
            searchModalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            window.scrollTo(0, scrollPosition);
        }
        
        function openConfigModal() {
            scrollPosition = window.scrollY;
            configModalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeConfigModal() {
            configModalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            window.scrollTo(0, scrollPosition);
        }

        function openReportModal() {
            generateReport();
            scrollPosition = window.scrollY;
            reportModalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeReportModal() {
            reportModalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            window.scrollTo(0, scrollPosition);
        }

        // --- GESTIÓN DE DATOS ---
        function loadData() {
            const storedState = localStorage.getItem('policeReportFullState');
            if (storedState) {
                fullState = JSON.parse(storedState);
                if (!fullState.configurations) fullState = JSON.parse(JSON.stringify(initialFullState));
            } else {
                fullState = JSON.parse(JSON.stringify(initialFullState));
            }
            appData = fullState.configurations[fullState.currentListId];
            renderUI();
        }
        
        function updatePersonnelDataFromDOM() {
            const personnelText = document.getElementById('personnelTextarea').value;
            const lines = personnelText.split('\n').map(line => line.trim()).filter(line => line !== '');
            const currentPersonnelList = fullState.allPersonnelLists[fullState.currentListId] || [];
            const newPersonnelData = [];
            const existingPersonnelMap = new Map(currentPersonnelList.map(p => [`${p.grade.toUpperCase()} ${p.name.toUpperCase()}`, p]));

            lines.forEach(line => {
                const parts = line.split(' ');
                if (parts.length >= 2) {
                    const grade = parts[0].trim();
                    const name = parts.slice(1).join(' ').trim();
                    const key = `${grade.toUpperCase()} ${name.toUpperCase()}`;
                    if (existingPersonnelMap.has(key)) {
                        const existingPerson = existingPersonnelMap.get(key);
                        existingPerson.grade = grade;
                        existingPerson.name = name;
                        existingPerson.category = getPersonnelCategory(grade);
                        newPersonnelData.push(existingPerson);
                    } else {
                        newPersonnelData.push({ id: generateUniqueId(), grade: grade, name: name, assigned: false, category: getPersonnelCategory(grade) });
                    }
                }
            });
            fullState.allPersonnelLists[fullState.currentListId] = newPersonnelData;
        }

        function saveDataToLocalStorage() {
            fullState.configurations[fullState.currentListId] = appData;
            localStorage.setItem('policeReportFullState', JSON.stringify(fullState));
        }

        function commitAndRender() {
            saveDataToLocalStorage();
            renderUI();
        }

        function saveData() {
            appData.commanderRank = document.getElementById('commanderRank').value;
            appData.commanderName = document.getElementById('commanderName').value;
            appData.importantServices = document.getElementById('importantServices').value.split('\n').filter(line => line.trim() !== '');
            updatePersonnelDataFromDOM();
            commitAndRender();
        }

        function updatePersonnelAssignedStatus() {
            const currentPersonnelList = fullState.allPersonnelLists[fullState.currentListId];
            if (!currentPersonnelList) return;
            currentPersonnelList.forEach(p => p.assigned = false);
            appData.caiSections.forEach(cai => cai.teams.forEach(team => team.members.forEach(memberId => {
                const person = currentPersonnelList.find(p => p.id === memberId);
                if (person) person.assigned = true;
            })));
            appData.otherGroups.forEach(group => group.members.forEach(memberId => {
                const person = currentPersonnelList.find(p => p.id === memberId);
                if (person) person.assigned = true;
            }));
        }

        // --- RENDERIZADO UI ---
        function createSearchableSelect(selectedPersonId = '', onChangeCallback) {
            const container = document.createElement('div');
            container.className = 'search-select-container';
            const currentPersonnelList = fullState.allPersonnelLists[fullState.currentListId];
            const selectedPerson = currentPersonnelList.find(p => p.id === selectedPersonId);
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'input-field';
            input.value = selectedPerson ? `${selectedPerson.grade.toUpperCase()} ${selectedPerson.name}` : '';
            input.placeholder = '-- Seleccionar --';
            input.autocomplete = 'off';
            const dropdown = document.createElement('div');
            dropdown.className = 'search-select-dropdown';
            const availablePersonnel = currentPersonnelList.filter(p => !p.assigned || p.id === selectedPersonId);
            availablePersonnel.sort((a, b) => a.grade.localeCompare(b.grade) || a.name.localeCompare(b.name));
            if (availablePersonnel.length === 0) {
                dropdown.innerHTML = `<div class="search-select-option text-gray-400">Sin personal disponible</div>`;
            } else {
                availablePersonnel.forEach(person => {
                    const option = document.createElement('div');
                    option.className = 'search-select-option';
                    option.textContent = `${person.grade.toUpperCase()} ${person.name}`;
                    option.onclick = () => onChangeCallback(person.id);
                    dropdown.appendChild(option);
                });
            }
            input.onfocus = () => {
                document.querySelectorAll('.search-select-dropdown').forEach(d => d.style.display = 'none');
                dropdown.style.display = 'block';
                input.select();
            };
            input.oninput = () => {
                const term = input.value.toLowerCase();
                dropdown.querySelectorAll('.search-select-option').forEach(opt => {
                    opt.style.display = opt.textContent.toLowerCase().includes(term) ? 'block' : 'none';
                });
            };
            container.appendChild(input);
            container.appendChild(dropdown);
            if (selectedPerson) {
                const clear = document.createElement('button');
                clear.innerHTML = '&times;';
                clear.className = 'search-select-clear-btn';
                clear.onclick = (e) => { e.stopPropagation(); onChangeCallback(''); };
                container.appendChild(clear);
            }
            return container;
            }
        function renderCaiSections() {
            const container = document.getElementById('caiSectionsContainer');
            container.innerHTML = '';
            appData.caiSections.forEach(cai => {
                const caiDiv = document.createElement('div');
                caiDiv.className = 'card mb-6';
                caiDiv.innerHTML = `
                    <div class="cai-section-title" onclick="toggleCaiSection('${cai.id}')">
                        <input type="text" value="${cai.name}" class="font-semibold input-field flex-grow mr-2" onchange="updateCaiName('${cai.id}', this.value)" onclick="event.stopPropagation();">
                        <i id="caiToggleIcon-${cai.id}" class="fas fa-chevron-up"></i>
                    </div>
                    <div id="caiContent-${cai.id}">
                        <div id="cai-teams-${cai.id}"></div>
                        <button onclick="addCaiTeam('${cai.id}')" class="btn btn-secondary btn-sm mt-2"><i class="fas fa-plus"></i> Equipo</button>
                        <div id="cai-info-${cai.id}" class="mt-4 pt-4 border-t border-gray-100"></div>
                    </div>`;
                container.appendChild(caiDiv);
                renderCaiTeams(cai.id);
                renderCaiInfoSection(cai.id, cai.name);
                applyCaiSectionState(cai.id);
            });
        }

        function renderCaiTeams(caiId) {
            const cai = appData.caiSections.find(c => c.id === caiId);
            const container = document.getElementById(`cai-teams-${caiId}`);
            container.innerHTML = '';
            cai.teams.forEach(team => {
                const div = document.createElement('div');
                div.className = 'card bg-white p-4 mb-2';
                div.innerHTML = `
                    <div class="flex justify-between items-center gap-2 mb-2">
                        <input type="text" value="${team.name}" class="font-semibold input-field flex-grow" onchange="updateCaiTeamName('${caiId}', '${team.id}', this.value)">
                        <button onclick="deleteCaiTeam('${caiId}', '${team.id}')" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                        <div id="m1-${team.id}"></div>
                        <div id="m2-${team.id}"></div>
                    </div>`;
                container.appendChild(div);
                document.getElementById(`m1-${team.id}`).appendChild(createSearchableSelect(team.members[0], (id) => updateCaiTeamMember(caiId, team.id, 0, id)));
                document.getElementById(`m2-${team.id}`).appendChild(createSearchableSelect(team.members[1], (id) => updateCaiTeamMember(caiId, team.id, 1, id)));
            });
        }

        function renderCaiInfoSection(caiId, caiName) {
            const container = document.getElementById(`cai-info-${caiId}`);
            const infoGroupName = `${caiName} (Información)`;
            const group = appData.otherGroups.find(g => g.name === infoGroupName);
            if (group) {
                container.innerHTML = `<h3 class="text-sm font-semibold mb-2">Información de ${caiName}</h3><div id="cont-${group.id}"></div><button onclick="addMemberToOtherGroup('${group.id}')" class="btn btn-secondary btn-sm mt-2"><i class="fas fa-plus"></i></button>`;
                renderOtherGroupMembers(group.id);
            }
        }

        function renderOtherGroups() {
            const container = document.getElementById('otherGroupsContainer');
            container.innerHTML = '';
            appData.otherGroups.filter(g => !g.name.includes("(Información)")).forEach(group => {
                const div = document.createElement('div');
                div.className = 'card mb-4';
                div.innerHTML = `
                    <div class="flex justify-between items-center gap-2 mb-2">
                        <input type="text" value="${group.name}" class="font-semibold input-field flex-grow" onchange="updateOtherGroupName('${group.id}', this.value)">
                        <button onclick="deleteOtherGroup('${group.id}')" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></button>
                    </div>
                    <div id="cont-${group.id}"></div>
                    <button onclick="addMemberToOtherGroup('${group.id}')" class="btn btn-secondary btn-sm mt-2"><i class="fas fa-plus"></i></button>`;
                container.appendChild(div);
                renderOtherGroupMembers(group.id);
            });
        }

        function renderOtherGroupMembers(groupId) {
            const group = appData.otherGroups.find(g => g.id === groupId);
            const container = document.getElementById(`cont-${groupId}`);
            if (!container) return;
            container.innerHTML = '';
            group.members.forEach((mId, idx) => {
                const d = document.createElement('div');
                d.className = 'mb-1';
                d.appendChild(createSearchableSelect(mId, (newId) => updateOtherGroupMember(groupId, idx, newId)));
                container.appendChild(d);
            });
        }

        // --- LÓGICA DE BÚSQUEDA Y FILTROS ---
        function setSearchFilter(filter) {
            searchFilter = filter;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${filter}`).classList.add('active');
            renderPersonnelSearch();
        }

        function renderPersonnelSearch() {
            const searchTerm = document.getElementById('personnelSearch').value.toLowerCase().trim();
            const resultsContainer = document.getElementById('personnelSearchResults');
            const currentPersonnelList = fullState.allPersonnelLists[fullState.currentListId];
            
            if (!currentPersonnelList) return;

            updatePersonnelAssignedStatus();

            let results = currentPersonnelList;

            // Filtro por nombre/grado
            if (searchTerm) {
                results = results.filter(p => p.name.toLowerCase().includes(searchTerm) || p.grade.toLowerCase().includes(searchTerm));
            }

            // Filtro por estado
            if (searchFilter === 'free') results = results.filter(p => !p.assigned);
            if (searchFilter === 'assigned') results = results.filter(p => p.assigned);

            // Actualizar contadores
            document.getElementById('count-all').textContent = currentPersonnelList.length;
            document.getElementById('count-free').textContent = currentPersonnelList.filter(p => !p.assigned).length;
            document.getElementById('count-assigned').textContent = currentPersonnelList.filter(p => p.assigned).length;

            resultsContainer.innerHTML = '';

            if (results.length === 0) {
                resultsContainer.innerHTML = '<p class="text-gray-400 text-center py-8">No se encontraron resultados</p>';
                return;
            }

            results.forEach(person => {
                const assignment = findAssignment(person.id);
                const item = document.createElement('div');
                item.className = 'search-result-item border-l-4 ' + (person.assigned ? 'border-red-400' : 'border-green-400');
                item.innerHTML = `
                    <div class="info">
                        <div class="font-bold text-gray-800">${person.grade} ${person.name}</div>
                        <div class="status ${person.assigned ? 'status-assigned' : 'status-free'}">
                            <i class="fas ${person.assigned ? 'fa-map-marker-alt' : 'fa-check-circle'} mr-1"></i>
                            ${person.assigned ? assignment : 'Disponible para asignación'}
                        </div>
                    </div>
                    ${person.assigned ? `<button onclick="unassignPersonnel('${person.id}')" class="btn btn-danger btn-sm" title="Liberar funcionario"><i class="fas fa-user-minus"></i></button>` : '<div class="text-green-500"><i class="fas fa-user-check"></i></div>'}`;
                resultsContainer.appendChild(item);
            });
        }

        function findAssignment(personId) {
            for (const cai of appData.caiSections) { 
                for (const team of cai.teams) { 
                    if (team.members.includes(personId)) return `${cai.name} / Equipo ${team.name}`; 
                } 
            }
            for (const group of appData.otherGroups) { 
                if (group.members.includes(personId)) return `Grupo: ${group.name}`; 
            }
            return null;
        }

        function unassignPersonnel(personId) {
            appData.caiSections.forEach(cai => cai.teams.forEach(team => {
                team.members = team.members.map(m => m === personId ? '' : m);
            }));
            appData.otherGroups.forEach(group => {
                group.members = group.members.map(m => m === personId ? '' : m);
            });
            commitAndRender();
            renderPersonnelSearch(); // Refrescar modal de búsqueda
        }

        // --- ACCIONES DE USUARIO ---
        function updateCaiName(id, n) { appData.caiSections.find(c => c.id === id).name = n.trim(); commitAndRender(); }
        function addCaiSection() { showModal('Nuevo CAI', 'Nombre del CAI:', 'prompt', '', n => { if(n){ const id = generateUniqueId(); appData.caiSections.push({id, name: n.trim(), teams: []}); appData.uiState.collapsedCaiSections[id] = false; appData.otherGroups.push({id: generateUniqueId(), name: `${n.trim()} (Información)`, members: []}); commitAndRender(); } }); }
        function updateCaiTeamName(cid, tid, n) { appData.caiSections.find(c => c.id === cid).teams.find(t => t.id === tid).name = n.trim(); commitAndRender(); }
        function addCaiTeam(id) { showModal('Nuevo Equipo', 'Nombre/Cuadrante:', 'prompt', '', n => { if(n){ appData.caiSections.find(c => c.id === id).teams.push({id: generateUniqueId(), name: n.trim(), members: []}); commitAndRender(); } }); }
        function deleteCaiTeam(cid, tid) { showModal('Eliminar', '¿Eliminar equipo?', 'confirm', '', c => { if(c){ const cai = appData.caiSections.find(c => c.id === cid); cai.teams = cai.teams.filter(t => t.id !== tid); commitAndRender(); } }); }
        function updateCaiTeamMember(cid, tid, idx, pid) { appData.caiSections.find(c => c.id === cid).teams.find(t => t.id === tid).members[idx] = pid; commitAndRender(); }
        function updateOtherGroupName(id, n) { appData.otherGroups.find(g => g.id === id).name = n.trim(); commitAndRender(); }
        function addOtherGroup() { const n = document.getElementById('newGroupName').value.trim(); if(n){ appData.otherGroups.push({id: generateUniqueId(), name: n, members: []}); document.getElementById('newGroupName').value = ''; commitAndRender(); } }
        function deleteOtherGroup(id) { showModal('Eliminar', '¿Eliminar grupo?', 'confirm', '', c => { if(c){ appData.otherGroups = appData.otherGroups.filter(g => g.id !== id); commitAndRender(); } }); }
        function addMemberToOtherGroup(id) { appData.otherGroups.find(g => g.id === id).members.push(''); commitAndRender(); }
        function updateOtherGroupMember(gid, idx, pid) { appData.otherGroups.find(g => g.id === gid).members[idx] = pid; commitAndRender(); }
        function toggleCaiSection(id) { const is = !appData.uiState.collapsedCaiSections[id]; appData.uiState.collapsedCaiSections[id] = is; applyCaiSectionState(id); saveDataToLocalStorage(); }
        function applyCaiSectionState(id) { const c = document.getElementById(`caiContent-${id}`); const i = document.getElementById(`caiToggleIcon-${id}`); const is = appData.uiState.collapsedCaiSections[id]; c.classList.toggle('hidden', is); i.classList.toggle('fa-chevron-up', !is); i.classList.toggle('fa-chevron-down', is); }

        function switchPersonnelList(id) {
            updatePersonnelDataFromDOM();
            fullState.currentListId = id;
            appData = fullState.configurations[id];
            commitAndRender();
        }

        function renderUI() {
            updatePersonnelAssignedStatus();
            document.getElementById('commanderRank').value = appData.commanderRank || "";
            document.getElementById('commanderName').value = appData.commanderName || "";
            document.getElementById('importantServices').value = (appData.importantServices || []).join('\n');
            document.getElementById('personnelTextarea').value = (fullState.allPersonnelLists[fullState.currentListId] || []).map(p => `${p.grade} ${p.name}`).join('\n');
            document.querySelectorAll('input[name="personnelListSelector"]').forEach(r => r.checked = r.value === fullState.currentListId);
            renderCaiSections();
            renderOtherGroups();
        }

        // --- GENERADOR DE INFORME ---
        function getGreeting() { const h = new Date().getHours(); return h >= 5 && h < 12 ? "buenos días" : h >= 12 && h < 19 ? "buenas tardes" : "buenas noches"; }
        function getTurno() { const h = new Date().getHours(); return h >= 5 && h <= 7 ? "segundo turno" : h >= 20 && h <= 22 ? "primer turno" : "tercer turno"; }

        function generateReport() {
            const greeting = getGreeting();
            const { commanderRank, commanderName, importantServices } = appData;
            const personnel = fullState.allPersonnelLists[fullState.currentListId];
            
            let counts = { Oficiales: 0, Suboficiales: 0, Patrulleros: 0 };
            const assignedIds = new Set();
            
            appData.caiSections.forEach(c => c.teams.forEach(t => t.members.forEach(id => id && assignedIds.add(id))));
            appData.otherGroups.forEach(g => {
                const countables = ["Jefe de Vigilancia", "Jefe de información", "Zona T"];
                if(countables.some(n => g.name.includes(n))) g.members.forEach(id => id && assignedIds.add(id));
            });

            assignedIds.forEach(id => {
                const p = personnel.find(x => x.id === id);
                if(p && counts[p.category] !== undefined) counts[p.category]++;
            });

            let report = `Dios y Patria mi Coronel ${greeting}, respetuosamente me permito reportar el personal para el ${getTurno()}, así:\n\n`;
            report += `*Parte =(${counts.Oficiales}-${counts.Suboficiales}-${counts.Patrulleros})*\n\n`;

            let zones = 0;
            appData.caiSections.forEach(c => c.teams.forEach(t => { if(t.members.length >= 2 && t.members[0] && t.members[1]) zones++; }));
            report += `Total: *(${zones})* Zonas de Atención asignados al Nuevo Modelo de Servicio de Policía en la Estación Barrios Unidos, así:\n\n`;

            appData.caiSections.forEach(c => {
                report += `*${toTitleCaseSmart(c.name)}*\n`;
                c.teams.forEach(t => {
                    const m = t.members.map(id => {
                        const p = personnel.find(x => x.id === id);
                        return p ? `${p.grade.toUpperCase()} ${toTitleCaseSmart(p.name)}` : 'S.A.';
                    }).join(' / ');
                    report += `🚔 ${t.name} ${m}\n`;
                });
                report += '\n';
            });

            const addGrp = (n, t) => {
                const g = appData.otherGroups.find(x => x.name === n);
                if(g && g.members.some(id => id)){
                    report += `*${toTitleCaseSmart(t)}*\n`;
                    g.members.forEach(id => { const p = personnel.find(x => x.id === id); if(p) report += `${p.grade.toUpperCase()} ${toTitleCaseSmart(p.name)}\n`; });
                    report += '\n';
                }
            };

            addGrp("Zona T", "Zona T");
            addGrp("Jefe de Vigilancia", "Jefe de Vigilancia");

            if(importantServices.length > 0){
                report += `*Servicios de Importancia*\n\n`;
                importantServices.forEach(s => report += `📍 ${toTitleCaseSmart(s)}\n`);
                report += '\n';
            }

            addGrp("Jefe de información E-12 y Centinelas", "Jefe de información E-12 y Centinelas");

            report += `${toTitleCaseSmart(commanderRank)} ${toTitleCaseSmart(commanderName)}\n*Comandante Estación de Policía Barrios Unidos*\n`;
            document.getElementById('reportOutput').textContent = report;
        }

        function copyReport() {
            const t = document.getElementById('reportOutput').textContent;
            const el = document.createElement('textarea');
            el.value = t;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const f = document.getElementById('copyFeedback');
            f.classList.add('show');
            setTimeout(() => f.classList.remove('show'), 2000);
        }

        function downloadData() {
            saveDataToLocalStorage();
            const blob = new Blob([JSON.stringify(fullState, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `informe-policia-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function handleFileUpload(e) {
            const f = e.target.files[0];
            if(!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const d = JSON.parse(ev.target.result);
                    if(d.configurations) { fullState = d; appData = fullState.configurations[fullState.currentListId]; commitAndRender(); }
                } catch(err) { console.error(err); }
            };
            reader.readAsText(f);
        }

        document.addEventListener('click', e => {
            if(!e.target.closest('.search-select-container')){
                document.querySelectorAll('.search-select-dropdown').forEach(d => d.style.display = 'none');
            }
        });

        window.onload = loadData;
    </script>
</body>
